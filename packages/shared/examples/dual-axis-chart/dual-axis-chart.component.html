<div style="position: relative;">
  <vis-xy-container
    [data]="data"
    [margin]="margin"
    [autoMargin]="false"
    [width]="'100%'"
    [height]="'40vh'"
  >
    <vis-area [x]="chartX" [y]="chartAY" opacity="0.9" />
    <vis-axis type='x' [numTicks]="3" [tickFormat]="xTicks" label="Time"/>
    <vis-axis type='y'
      [tickFormat]="chartAYTicks"
      [tickTextWidth]="60"
      [tickTextColor]="'#4D8CFD'"
      [labelColor]="'#4D8CFD'"
      label="Traffic"
    />
  </vis-xy-container>
  <vis-xy-container
    class="chart-overlay"
    [data]="data"
    [yDomain]="[0, 150]"
    [margin]="margin"
    [autoMargin]="false"
    [width]="'100%'"
    [height]="'40vh'"
  >
    <vis-line [x]="chartX" [y]="chartBY" color='#FF6B7E' />
    <vis-axis
      type="y"
      [position]="'right'"
      [tickFormat]="chartBYTicks"
      [gridLine]="false"
      [tickTextColor]="'#FF6B7E'"
      [labelColor]="'#FF6B7E'"
      label="Signal Strength"
    />
  </vis-xy-container>
</div>
