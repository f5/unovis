name: Cypress Percy Tests

on:
  schedule:
    # 8:10 UTC time on Thursday
    - cron: '10 8 * * 4'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.23.0
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml
    - name: Cache Cypress binary
      uses: actions/cache@v4
      with:
        path: ~/.cache/Cypress
        key: cypress-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          cypress-${{ runner.os }}-
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Install Cypress binary
      run: cd packages/dev && pnpm exec cypress install
    - name: Verify Cypress installation
      run: cd packages/dev && pnpm exec cypress version
    - name: Build
      run: pnpm run build && pnpm run build:dev
    - name: Start server
      run: cd packages/dev; pnpm run serve & sleep 5
    - name: Validate Percy token
      env:
        PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
      run: |
        if [ -z "$PERCY_TOKEN" ]; then
          echo "::error::PERCY_TOKEN is not configured. Percy snapshots will not upload."
          exit 1
        fi
    - name: Run tests
      run: cd packages/dev; pnpm test
      env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
    - name: Stop server
      run: pkill -f "serve dist -s -p 9501"
